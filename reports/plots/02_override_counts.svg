<text x="28.0" y="454.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="start">Override = final accept/reject disagrees with reviewer-majority signal. This is a public-data proxy, not private AC intent.</text>
