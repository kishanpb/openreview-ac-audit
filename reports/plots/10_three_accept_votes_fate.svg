<text x="28.0" y="36.0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">What happens to papers with at least three accept-leaning reviews?</text>
<text x="28.0" y="64.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">This directly probes the 3-accept argument: among papers with 3+ reviewer accept votes, how many are</text>
<text x="28.0" y="82.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">still rejected? Labels show how many such rejects expose any public rationale.</text>
