<text x="620.0" y="297.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">5</text>
<line x1="730.0" x2="730.0" y1="165" y2="275" stroke="#e5e7eb"/>
<text x="730.0" y="297.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">6</text>
<line x1="510.0" x2="510.0" y1="165" y2="275" stroke="#111827" stroke-dasharray="4 4" stroke-width="2"/>
<text x="517.0" y="178.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#111827" text-anchor="start">accept threshold 4</text>
