<text x="796.0" y="184.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Final public decision</text>
<text x="974.0" y="184.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">REJECT</text>
<text x="796.0" y="215.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Reviewer majority</text>
<text x="974.0" y="215.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">accept</text>
<text x="796.0" y="246.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Weighted mean</text>
<text x="974.0" y="246.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">4.75</text>
<text x="796.0" y="277.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Public meta-review?</text>
<text x="974.0" y="277.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">no</text>
<text x="796.0" y="308.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Decision comment words</text>
<text x="974.0" y="308.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">263</text>
<text x="796.0" y="339.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#6b7280" text-anchor="start">Clusterable meta-review?</text>
<text x="974.0" y="339.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827" text-anchor="start">no</text>
<text x="40.0" y="340.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="start">Interpretation: this is a mixed transparency case. The public decision comment is</text>
<text x="40.0" y="358.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="start">substantive and names empirical/significance concerns, but there is no separate public</text>
<text x="40.0" y="376.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="start">meta-review, so it is not included in the ICLR meta-review clustering and is harder to</text>
<text x="40.0" y="394.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#374151" text-anchor="start">audit against AC meta-review guidelines.</text>
<text x="40.0" y="544.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" text-anchor="start">Source: public NeurIPS 2025 OpenReview forum iJ4i5HE5ER.</text>
