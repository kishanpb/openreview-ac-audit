<text x="28.0" y="36.0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">Case diagnostic: SophiaVL-R1 (NeurIPS 2025, iJ4i5HE5ER)</text>
<text x="28.0" y="64.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">This example has a reviewer-majority accept signal and a final reject. It exposes a decision comment,</text>
<text x="28.0" y="82.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">but not a separate public AC/meta-review field.</text>
