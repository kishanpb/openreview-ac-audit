<text x="28.0" y="36.0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">How much of 3+ accept-vote rejection is simple capacity pressure?</text>
<text x="28.0" y="64.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">A conservative decomposition: capacity arithmetic can explain at most the shortfall between 3+</text>
