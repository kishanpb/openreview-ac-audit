<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450">
<rect width="100%" height="100%" fill="#fbfbf8"/>
<text x="28.0" y="36.0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">Do public override cases expose an AC/PC rationale?</text>
<text x="28.0" y="64.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">Bars show the share of majority-signal overrides with a public meta-review and with any public</text>
<text x="28.0" y="82.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">rationale. Labels show median public-rationale length when a rationale exists.</text>
