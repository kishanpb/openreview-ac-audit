<text x="28.0" y="434.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="start">Absence of public rationale is not proof of absent private deliberation; it is a visibility gap in fetched public notes.</text>
