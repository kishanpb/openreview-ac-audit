<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
<rect width="100%" height="100%" fill="#fbfbf8"/>
<text x="28.0" y="36.0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="start">When all reviewers point one way, is the public override heavily justified?</text>
<text x="28.0" y="64.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">ICLR-only comparable public meta-review test: 150+ words, mentions reviews, and uses causal</text>
<text x="28.0" y="82.0" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#4b5563" text-anchor="start">concern/issue language.</text>
<line x1="185.0" x2="185.0" y1="120" y2="346" stroke="#e5e7eb"/>
<text x="185.0" y="364.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">0%</text>
<line x1="320.8" x2="320.8" y1="120" y2="346" stroke="#e5e7eb"/>
<text x="320.8" y="364.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">25%</text>
<line x1="456.5" x2="456.5" y1="120" y2="346" stroke="#e5e7eb"/>
<text x="456.5" y="364.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">50%</text>
<line x1="592.2" x2="592.2" y1="120" y2="346" stroke="#e5e7eb"/>
<text x="592.2" y="364.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">75%</text>
<line x1="728.0" x2="728.0" y1="120" y2="346" stroke="#e5e7eb"/>
<text x="728.0" y="364.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="middle">100%</text>
<text x="28.0" y="150.0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#17202a" text-anchor="start">ICLR 2024</text>
<rect x="185" y="138.0" width="285.1" height="18" rx="2" fill="#7158a8"/>
<text x="478.1" y="152.0" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#17202a" text-anchor="start">52% of 80 unanimous overrides</text>
<text x="28.0" y="225.3" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#17202a" text-anchor="start">ICLR 2025</text>
<rect x="185" y="213.33333333333331" width="379.4" height="18" rx="2" fill="#7158a8"/>
<text x="572.4" y="227.3" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#17202a" text-anchor="start">70% of 73 unanimous overrides</text>
<text x="28.0" y="300.7" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#17202a" text-anchor="start">ICLR 2026</text>
<rect x="185" y="288.66666666666663" width="408.8" height="18" rx="2" fill="#7158a8"/>
<text x="601.8" y="302.7" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="400" fill="#17202a" text-anchor="start">75% of 85 unanimous overrides</text>
<text x="28.0" y="394.0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" text-anchor="start">ICML/NeurIPS omitted here because their public decision-comment surfaces are not comparable meta-review fields.</text>
</svg>
